name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
    steps:
      - uses: actions/checkout@v5

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Print Swift version
        run: swift --version

      - name: Build
        run: swift build
        working-directory: app

      - name: Test
        run: swift test
        working-directory: app
